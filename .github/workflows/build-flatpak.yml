name: Build and Publish Flatpak

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to releases'
        required: false
        default: 'false'

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build Flatpak
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - name: 'x86_64 (primary)'
            arch: 'x86_64'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            flatpak \
            flatpak-builder \
            elfutils \
            appstream \
            appstream-util \
            desktop-file-utils \
            libxml2-utils

      - name: Add Flathub remote
        run: |
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Install GNOME SDKs and runtimes
        run: |
          flatpak install --user --noninteractive \
            org.gnome.Platform//46 \
            org.gnome.Sdk//46

      - name: Validate manifest
        run: |
          echo "✓ Validating Flatpak manifest..."
          # Check file exists and is readable
          if [ ! -f ca.dcloud.ICAClient.yml ]; then
            echo "✗ Manifest file not found"
            exit 1
          fi
          # Basic YAML syntax check with yamllint
          if command -v yamllint &> /dev/null; then
            yamllint -d '{extends: relaxed}' ca.dcloud.ICAClient.yml
          else
            python3 -c "import yaml; yaml.safe_load(open('ca.dcloud.ICAClient.yml'))"
          fi
          echo "✓ Manifest is valid"

      - name: Validate desktop file
        run: |
          echo "✓ Validating desktop file..."
          desktop-file-validate ca.dcloud.ICAClient.desktop

      - name: Build Flatpak bundle
        run: |
          set -e
          echo "Starting Flatpak build..."
          mkdir -p flatpak-build
          
          if flatpak-builder \
            --user \
            --install \
            --disable-rofiles-fuse \
            --force-clean \
            --verbose \
            flatpak-build \
            ca.dcloud.ICAClient.yml 2>&1 | tee build.log; then
            echo "✓ Flatpak build completed successfully"
          else
            BUILD_EXIT=$?
            echo "✗ Flatpak build failed with exit code $BUILD_EXIT"
            echo "=== Build Log (last 100 lines) ==="
            tail -100 build.log
            exit $BUILD_EXIT
          fi

      - name: Create Flatpak bundle
        run: |
          echo "Creating Flatpak bundle..."
          
          mkdir -p dist/
          
          flatpak build-bundle \
            --runtime-repo=https://flathub.org/repo/flathub.flatpakrepo \
            dist/ca.dcloud.ICAClient.flatpak \
            ca.dcloud.ICAClient 2>&1 || true
          
          if [ -f "dist/ca.dcloud.ICAClient.flatpak" ]; then
            echo "✓ Flatpak bundle created"
            ls -lh dist/ca.dcloud.ICAClient.flatpak
          else
            echo "⚠ Flatpak bundle not created (this may be expected in some environments)"
          fi

      - name: Validate appdata file
        run: |
          echo "✓ Validating appstream data..."
          appstream-util validate-relax ca.dcloud.ICAClient.appdata.xml

      - name: Generate build report
        if: always()
        run: |
          cat > build-report.md << 'EOF'
          # Build Report
          
          - **Build Status**: ${{ job.status }}
          - **Platform**: ${{ matrix.arch }}
          - **Git Commit**: ${{ github.sha }}
          - **Build Date**: $(date -u '+%Y-%m-%dT%H:%M:%SZ')
          
          ## Artifacts
          - Flatpak Manifest: `ca.dcloud.ICAClient.yml`
          - Desktop Entry: `ca.dcloud.ICAClient.desktop`
          - AppData: `ca.dcloud.ICAClient.appdata.xml`
          
          ## Build Log
          Last 100 lines of build output:
          \`\`\`
          $(tail -100 build.log 2>/dev/null || echo "No build log available")
          \`\`\`
          
          ## System Information
          - OS: $(uname -a)
          - Flatpak version: $(flatpak --version 2>/dev/null || echo "Not installed")
          - Available disk space: $(df -h / | tail -1)
          - Memory available: $(free -h | grep Mem)
          EOF
          
          echo "=== Build Report ===" 
          cat build-report.md

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-${{ matrix.arch }}-build-${{ github.run_number }}
          path: |
            dist/
            build-report.md
            flatpak-build/.flatpak-builder/cache/ 
          retention-days: 7

  publish:
    name: Publish Flatpak Release
    runs-on: ubuntu-latest
    needs: build
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          
          # Check if artifacts directory exists
          if [ ! -d artifacts ]; then
            echo "⚠ No artifacts directory found, build may have failed"
            exit 0
          fi
          
          # Find and copy flatpak bundle
          find artifacts -name "*.flatpak" -exec cp {} release-assets/ \; 2>/dev/null || true
          
          # Create checksums if artifact exists
          if [ -f release-assets/ca.dcloud.ICAClient.flatpak ]; then
            cd release-assets
            sha256sum ca.dcloud.ICAClient.flatpak > CHECKSUMS.sha256
            echo "✓ Release assets prepared:"
            ls -lh
          else
            echo "⚠ No Flatpak bundle found in artifacts"
          fi

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release-assets/ca.dcloud.ICAClient.flatpak
            release-assets/CHECKSUMS.sha256
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "Container registry publishing is configured but requires"
          echo "additional setup with proper authentication credentials."
          echo "See CONTRIBUTING.md for details on publishing to registries."

  notify:
    name: Build Notification
    runs-on: ubuntu-latest
    needs: build
    if: always()

    steps:
      - name: Determine build status
        run: |
          BUILD_RESULT="${{ needs.build.result }}"
          
          case "$BUILD_RESULT" in
            success)
              echo "✅ Build Status: SUCCESS"
              echo "The Flatpak build completed successfully"
              exit 0
              ;;
            failure)
              echo "❌ Build Status: FAILED"
              echo "The Flatpak build encountered an error"
              exit 1
              ;;
            cancelled)
              echo "⏸️  Build Status: CANCELLED"
              echo "The workflow was cancelled"
              exit 1
              ;;
            skipped)
              echo "⊘ Build Status: SKIPPED"
              echo "The build was skipped"
              exit 0
              ;;
            *)
              echo "❓ Build Status: UNKNOWN ($BUILD_RESULT)"
              exit 1
              ;;
          esac
